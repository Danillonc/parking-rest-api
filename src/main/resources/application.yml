# application.yml
server:
  port: 8081

spring:
  application:
    name: garage-sim
  datasource:
    url: jdbc:mysql://localhost:3306/parking_db?createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: garage-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# Configuração da nossa integração externa
simulator:
  api:
    # Se rodar via IDE: usa localhost:3000
    # Se rodar via Docker: injetamos o nome do container
    url: ${SIMULATOR_URL:http://localhost:3000}